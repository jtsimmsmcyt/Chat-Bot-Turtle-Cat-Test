<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Turtle Cat Chatbot</title>
</head>

<body style="margin:0; background:#050505;">

<div id="topbar" style="
  font-family: monospace;
  background:#0a0a0a;
  color:#7CFFB2;
  padding:8px;
  border:2px solid #7CFFB2;
">
  TURTLE CAT 🐢🐱 NAME: <span id="nameDisplay"></span> |
  ⚠️ <span id="warnDisplay">0</span>
</div>

<div id="chat" style="
  font-family: monospace;
  background:#050505;
  color:#7CFFB2;
  padding:10px;
  height:300px;
  overflow-y:auto;
  border:2px solid #7CFFB2;
"></div>

<div style="margin-top:5px;">
  <input id="input" placeholder="Talk to turtle cat..." style="
    width:75%;
    background:black;
    color:#7CFFB2;
    border:1px solid #7CFFB2;
    padding:8px;
    font-family:monospace;
  ">
  <button onclick="send()" style="
    width:20%;
    background:#7CFFB2;
    border:none;
    padding:8px;
  ">Send</button>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const nameDisplay = document.getElementById("nameDisplay");
const warnDisplay = document.getElementById("warnDisplay");

// 🧠 memory
let turtleName = localStorage.getItem("turtle_name") || "Unnamed Turtle";
let warnings = parseInt(localStorage.getItem("turtle_warn") || "0");
let mutedUntil = 0;

nameDisplay.textContent = turtleName;
warnDisplay.textContent = warnings;

// 🌐 ONLINE BAD WORD LIST
let badWords = [];

fetch("https://raw.githubusercontent.com/coffee-and-fun/google-profanity-words/main/data/en.txt")
  .then(res => res.text())
  .then(text => {
    badWords = text.split("\n").map(w => w.trim()).filter(Boolean);
    console.log("Bad words loaded:", badWords.length);
  });

// 💾 save
function saveAll() {
  localStorage.setItem("turtle_name", turtleName);
  localStorage.setItem("turtle_warn", warnings);
  nameDisplay.textContent = turtleName;
  warnDisplay.textContent = warnings;
}

// 💬 add message
function add(text) {
  const div = document.createElement("div");
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🚫 STRONG FILTER
function containsBadWord(text) {
  if (!badWords.length) return false; // prevents early false triggers

  const clean = text.toLowerCase().replace(/[^a-z ]/g, " ");
  const words = clean.split(" ").filter(Boolean);

  return badWords.some(b => words.includes(b));
}

// ⚠️ punishment
function handleWarning() {
  warnings++;
  saveAll();

  if (warnings === 1) return "TURTLE CAT 🐢🐱: warning 1 ⚠️";
  if (warnings === 2) return "TURTLE CAT 🐢🐱: warning 2 ⚠️";
  if (warnings >= 3) {
    mutedUntil = Date.now() + 10000;
    return "TURTLE CAT 🐢🐱: MUTED 🔇 (10 sec)";
  }
}

// 🧠 MAIN LOGIC
function reply(text) {
  const t = text.toLowerCase().trim();

  // 🔇 mute
  if (Date.now() < mutedUntil) {
    return "TURTLE CAT 🐢🐱: ... (muted)";
  }

  // 🚫 BAD WORDS FIRST (CRITICAL)
  if (containsBadWord(text)) {
    return handleWarning();
  }

  // 🔄 reset name
  if (t === "reset name") {
    turtleName = "Unnamed Turtle";
    warnings = 0;
    saveAll();
    return "TURTLE CAT 🐢🐱: name reset!!";
  }

  // 🐱 name reaction
  if (t === turtleName.toLowerCase()) {
    return "TURTLE CAT 🐢🐱: what?";
  }

  // 🐱 name change
  if (t.includes("can i call you")) {
    let newName = text
      .toLowerCase()
      .split("can i call you")[1]
      .replace(/[?.]/g, "")
      .trim();

    if (!newName) return "TURTLE CAT 🐢🐱: I didn’t catch the name!";

    if (containsBadWord(newName)) {
      return handleWarning();
    }

    turtleName = newName;
    saveAll();

    return "TURTLE CAT 🐢🐱: that’s a purrfect name! 🐱✨";
  }

  // 👋 greetings
  const words = t.split(" ");
  if (words.includes("hi") || words.includes("hello")) {
    return `TURTLE CAT 🐢🐱 (${turtleName}): hiiii!!`;
  }

  if (t.includes("how are you")) {
    return `TURTLE CAT 🐢🐱 (${turtleName}): I'm doing great!!`;
  }

  if (t.includes("love")) {
    return `TURTLE CAT 🐢🐱 (${turtleName}): I love you too 💚`;
  }

  // 💬 fallback (ONLY if nothing matched)
  return `TURTLE CAT 🐢🐱 (${turtleName}): tell me more 👀`;
}

// send
function send() {
  const text = input.value.trim();
  if (!text) return;

  add("YOU: " + text);
  input.value = "";

  add(reply(text));
}
</script>

</body>
</html>
